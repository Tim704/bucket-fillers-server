# Bucket Fillers — cloudflared routes bucketfillers.timhufnagel.org → 127.0.0.1:3000.
services:
  bucketfillers:
    build: .
    image: bucket-fillers-server:latest
    container_name: bucket-fillers-server
    restart: unless-stopped            # survives reboot; the whole point of the migration
    volumes:
      - ./:/app                        # code + data.json on one fs → atomic rename works
    ports:
      - "127.0.0.1:3000:3000"          # tunnel-only exposure
    mem_limit: 128m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
